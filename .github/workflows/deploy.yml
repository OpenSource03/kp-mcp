name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The `environment:` block makes GitHub auto-create the Deployment
    # record with the right status lifecycle (in_progress → success/failure
    # based on job outcome). No manual deployment-action call needed.
    environment:
      name: production
      url: https://kp.osrc.io/mcp

    steps:
      - name: Wait for new build to roll out
        run: |
          set -e
          # Server polls master and rolls out new commits within ~60s.
          # Confirm /health is OK and give the rollout time to take effect.
          for i in $(seq 1 60); do
            BODY=$(curl -fsS -m 8 https://kp.osrc.io/health 2>/dev/null || true)
            if echo "$BODY" | grep -q '"ok":true'; then
              echo "[$i] live: $BODY"
              if [ "$i" -ge 6 ]; then exit 0; fi
            else
              echo "[$i] not ready yet"
            fi
            sleep 5
          done
          echo "✗ /health never confirmed in time" >&2
          exit 1

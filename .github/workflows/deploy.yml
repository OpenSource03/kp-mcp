name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://kp.osrc.io/mcp

    steps:
      - name: Mark deployment in_progress
        id: gh_deploy
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ github.token }}
          environment: production
          environment-url: https://kp.osrc.io/mcp

      - name: Trigger deploy
        env:
          DEPLOY_URL: ${{ secrets.COOLIFY_URL }}
          DEPLOY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          APP_UUID: ${{ secrets.COOLIFY_SERVICE_UUID }}
        run: |
          set -e
          HTTP=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
            -X POST -H "Authorization: Bearer $DEPLOY_TOKEN" \
            "$DEPLOY_URL/api/v1/applications/$APP_UUID/start")
          echo "HTTP $HTTP"
          cat /tmp/resp.txt
          test "$HTTP" -ge 200 -a "$HTTP" -lt 300

      - name: Wait for /health
        run: |
          set -e
          for i in $(seq 1 90); do
            if curl -fsS -m 8 https://kp.osrc.io/health | grep -q '"ok":true'; then
              echo "✓ healthy on attempt $i"
              exit 0
            fi
            sleep 5
          done
          echo "✗ never recovered" >&2
          exit 1

      - name: Mark deployment success
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.gh_deploy.outputs.deployment_id }}
          state: success
          environment-url: https://kp.osrc.io/mcp
          description: Live at kp.osrc.io

      - name: Mark deployment failure
        if: failure()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.gh_deploy.outputs.deployment_id }}
          state: failure
          description: Deploy failed — see Action logs

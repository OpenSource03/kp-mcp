<!doctype html>
<html lang="en">
<meta charset="utf-8" />
<style>
  /* ---- KP brand tokens (mirrored from kupujemprodajem.com CSS) ---- */
  :root {
    color-scheme: light dark;
    --kp-red: #ff1e00;          /* red-500-brand */
    --kp-red-hover: #cc1800;    /* red-600 */
    --kp-navy: #003368;         /* navy-blue-700-brand */
    --kp-bg: #f0f0f0;           /* grayscale-100 */
    --kp-card: #ffffff;
    --kp-border: #e0e7ef;       /* navy-blue-200 */
    --kp-text: #171717;         /* grayscale-900 */
    --kp-muted: #666;           /* grayscale-600 */
    --kp-muted-soft: #999;      /* grayscale-500 */
    --kp-hover-row: #f4f6f8;    /* navy-blue-100 */
    --kp-success: #1f7a4d;
  }
  :root.dark {
    --kp-bg: #0d0f11;           /* dark-neutral-900 */
    --kp-card: #1b1f23;         /* dark-neutral-700 */
    --kp-border: #282e34;       /* dark-neutral-600 */
    --kp-text: #f0f0f0;
    --kp-muted: #999;
    --kp-muted-soft: #6b7178;
    --kp-hover-row: #22272d;
    --kp-red: #ff624d;          /* red-400 reads better on dark */
    --kp-red-hover: #ff1e00;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 8px 4px;
    color: var(--kp-text);
    font: 13px/1.4 "PT Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: transparent;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 8px 6px;
    color: var(--kp-muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .header a {
    color: var(--kp-navy);
    text-decoration: none;
    font-weight: 700;
    text-transform: none;
    letter-spacing: 0;
    font-size: 12px;
  }
  :root.dark .header a { color: #84caf0; }
  .header a:hover { text-decoration: underline; }
  .empty {
    padding: 28px 16px;
    text-align: center;
    color: var(--kp-muted);
    background: var(--kp-card);
    border: 1px solid var(--kp-border);
    border-radius: 8px;
  }
  .list {
    background: var(--kp-card);
    border: 1px solid var(--kp-border);
    border-radius: 8px;
    overflow: hidden;
  }
  .row {
    display: grid;
    grid-template-columns: 88px 1fr auto;
    gap: 12px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--kp-border);
    align-items: stretch;
    cursor: pointer;
    transition: background 0.08s ease;
    text-decoration: none;
    color: inherit;
  }
  .row:last-child { border-bottom: none; }
  .row:hover { background: var(--kp-hover-row); }
  .thumb-wrap {
    width: 88px;
    height: 88px;
    border-radius: 6px;
    overflow: hidden;
    background: var(--kp-bg);
    flex-shrink: 0;
  }
  .thumb {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .thumb-empty {
    display: flex;
    width: 100%; height: 100%;
    align-items: center;
    justify-content: center;
    color: var(--kp-muted-soft);
    font-size: 10px;
  }
  .info {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
    justify-content: space-between;
  }
  .title {
    font-weight: 700;
    color: var(--kp-text);
    line-height: 1.25;
    font-size: 13px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-word;
  }
  .row:hover .title { color: var(--kp-navy); }
  :root.dark .row:hover .title { color: #84caf0; }
  .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 10px;
    color: var(--kp-muted);
    font-size: 11px;
    align-items: center;
  }
  .meta .sep { color: var(--kp-muted-soft); }
  .seller {
    color: var(--kp-muted);
    font-size: 11px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .seller .reviews {
    color: var(--kp-success);
    font-weight: 700;
  }
  .seller .verified {
    display: inline-block;
    margin-left: 4px;
    color: var(--kp-navy);
    font-weight: 700;
  }
  :root.dark .seller .verified { color: #84caf0; }
  .right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: space-between;
    gap: 6px;
    min-width: 80px;
  }
  .price {
    color: var(--kp-red);
    font-weight: 700;
    font-size: 15px;
    white-space: nowrap;
    line-height: 1.1;
  }
  .price-tag {
    font-size: 10px;
    color: var(--kp-muted);
    font-weight: 400;
  }
  .actions { display: flex; gap: 4px; }
  .iconbtn {
    width: 26px; height: 26px;
    border-radius: 4px;
    border: 1px solid var(--kp-border);
    background: transparent;
    color: var(--kp-muted);
    display: grid;
    place-items: center;
    cursor: pointer;
    padding: 0;
    transition: color 0.1s ease, border-color 0.1s ease, background 0.1s ease;
  }
  .iconbtn:hover { color: var(--kp-red); border-color: var(--kp-red); }
  .iconbtn svg { width: 14px; height: 14px; }
</style>
<body>
  <div class="header" id="header"></div>
  <div id="root"></div>

  <script>/*__EXT_APPS_BUNDLE__*/</script>
  <script type="module">
    const { App } = globalThis.ExtApps;
    const app = new App({ name: "kp-search", version: "0.1.0" }, {}, { autoResize: true });

    const root = document.getElementById("root");
    const header = document.getElementById("header");

    function applyTheme() {
      // claude.ai web's `hostContext` shape breaks `applyHostStyleVariables`
      // (TypeError on `.setProperty`). Just toggle the `dark` class — our CSS
      // vars handle the rest.
      const ctx = app.getHostContext?.() ?? {};
      document.documentElement.classList.toggle("dark", ctx.theme === "dark");
    }

    function escapeHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, (c) => (
        { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
      ));
    }

    function bindOpen(id, url) {
      if (!url) return;
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener("click", (e) => { e.preventDefault(); app.openLink({ url }); });
    }

    function renderEmpty(searchUrl) {
      root.innerHTML = `<div class="empty">No results. Try broader keywords or relax filters.</div>`;
      header.innerHTML = searchUrl ? `<span></span><a href="#" id="kp-link">Open on KP →</a>` : "";
      bindOpen("kp-link", searchUrl);
    }

    const ICON_INFO = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6.5"/><line x1="8" y1="7.5" x2="8" y2="11"/><circle cx="8" cy="5" r="0.5" fill="currentColor"/></svg>`;
    const ICON_OPEN = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h4v4"/><path d="M13 3l-7 7"/><path d="M11 9v3.5a1.5 1.5 0 0 1-1.5 1.5h-6A1.5 1.5 0 0 1 2 12.5v-6A1.5 1.5 0 0 1 3.5 5H7"/></svg>`;

    function renderRow(p) {
      const a = document.createElement("a");
      a.className = "row";
      a.href = p.adUrl || "#";

      const thumb = p.image
        ? `<div class="thumb-wrap"><img class="thumb" loading="lazy" src="${escapeHtml(p.image)}" alt=""></div>`
        : `<div class="thumb-wrap"><div class="thumb-empty">no photo</div></div>`;

      // Search results don't carry seller info on KP — that's only populated on
      // detail pages. Render the row only if we actually have a username.
      const hasSeller = !!p.user?.username;
      const sellerLine = hasSeller
        ? `<div class="seller">${escapeHtml(p.user.username)} <span class="reviews">+${escapeHtml(p.user.reviewsPositive || "0")}</span>${
            (p.user.hasUserVerifiedBankAccount || p.user.hasCompanyVerifiedBankAccount)
              ? `<span class="verified" title="Verified bank account">✓</span>` : ""
          }</div>`
        : "";

      const priceTag = p.isPriceFixed ? `<div class="price-tag">fixed</div>`
        : (p.isExchange ? `<div class="price-tag">exchange</div>` : "");

      a.innerHTML = `
        ${thumb}
        <div class="info">
          <div class="title">${escapeHtml(p.name || "Untitled")}</div>
          <div class="meta">
            <span>${escapeHtml(p.location || "—")}</span>
            ${p.postedDesc ? `<span class="sep">·</span><span>${escapeHtml(p.postedDesc)}</span>` : ""}
            ${p.viewCount ? `<span class="sep">·</span><span>${escapeHtml(p.viewCount)} views</span>` : ""}
          </div>
          ${sellerLine}
        </div>
        <div class="right">
          <div>
            <div class="price">${escapeHtml(p.priceText || "—")}</div>
            ${priceTag}
          </div>
          <div class="actions">
            <button class="iconbtn details" type="button" title="Get full details">${ICON_INFO}</button>
            <button class="iconbtn open" type="button" title="Open on KP">${ICON_OPEN}</button>
          </div>
        </div>
      `;

      a.addEventListener("click", (e) => {
        // Default: open on KP. Buttons stop propagation below.
        e.preventDefault();
        if (p.adUrl) app.openLink({ url: p.adUrl });
      });
      a.querySelector(".details").addEventListener("click", (e) => {
        e.stopPropagation();
        app.sendMessage({
          role: "user",
          content: [{
            type: "text",
            text: `Get full details for this KP listing using the fetch_listing tool: ${p.adUrl}`,
          }],
        });
      });
      a.querySelector(".open").addEventListener("click", (e) => {
        e.stopPropagation();
        if (p.adUrl) app.openLink({ url: p.adUrl });
      });

      return a;
    }

    function renderResults(payload) {
      const { products = [], searchUrl = "", totalReturned = 0, truncated = false } = payload;
      if (!products.length) return renderEmpty(searchUrl);

      header.innerHTML = `
        <span>${totalReturned} result${totalReturned === 1 ? "" : "s"}${truncated ? " (truncated)" : ""}</span>
        ${searchUrl ? `<a href="#" id="kp-link">Open on KP →</a>` : ""}
      `;
      bindOpen("kp-link", searchUrl);

      const list = document.createElement("div");
      list.className = "list";
      for (const p of products) list.append(renderRow(p));
      root.innerHTML = "";
      root.append(list);
    }

    app.ontoolresult = ({ structuredContent, content }) => {
      let payload = structuredContent;
      if (!payload && content) {
        for (const c of content) {
          if (c?.type !== "text") continue;
          try { const j = JSON.parse(c.text); if (j && (j.products || j.searchUrl)) { payload = j; break; } } catch {}
        }
      }
      renderResults(payload || {});
    };

    app.onhostcontextchanged = () => applyTheme();

    await app.connect();
    applyTheme();
  </script>
</body>
</html>
